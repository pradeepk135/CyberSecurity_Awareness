<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synersys Security Portal - Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #0f2138;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        .orange {
            color: #f26b1f;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .status-item {
            margin: 10px 0;
            font-size: 16px;
            text-align: left;
        }
        
        .button {
            background: #f26b1f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        
        .timestamp {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Synersys <span class="orange">Security</span> Portal</h1>
        <p style="font-size: 18px; margin-bottom: 20px;">Working Test Page</p>
        
        <div class="status">
            <div class="status-item">✅ Page loaded successfully</div>
            <div class="status-item">✅ CSS styles applied</div>
            <div class="status-item">✅ Docker container active</div>
            <div class="status-item">✅ Network connection working</div>
        </div>
        
        <button class="button" onclick="location.reload()">Refresh Page</button>
        <button class="button" onclick="alert('JavaScript is working!')">Test JS</button>
        
        <div class="timestamp">
            Page loaded: <span id="time"></span>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        console.log('Working page loaded successfully!');
    </script>
</body>
</html>
