<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synersys Security Awareness Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  
  <!-- Load React from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand */
      --navy:        #0f2138;
      --navy-dark:   #091828;
      --navy-mid:    #1a3352;
      --navy-light:  #254a72;
      --orange:      #f26b1f;
      --orange-dark: #d8581a;
      --orange-soft: #fff0e6;
      --orange-mid:  rgba(242,107,31,0.15);

      /* Neutrals */
      --bg:          #eef0f5;
      --surface:     #ffffff;
      --surface-2:   #f7f8fb;
      --border:      #e3e6ed;
      --border-2:    #d0d4de;

      /* Ink */
      --ink-900:  #111827;
      --ink-700:  #374151;
      --ink-500:  #6b7280;
      --ink-400:  #9ca3af;
      --ink-300:  #d1d5db;

      /* Sidebar */
      --side-w:   256px;

      /* Fonts */
      --font-display: 'Outfit', sans-serif;
      --font-body:    'IBM Plex Sans', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;

      /* Module colors */
      --m0: #3b82f6; --m1: #8b5cf6; --m2: #06b6d4; --m3: #f59e0b;
      --m4: #10b981; --m5: #ef4444; --m6: #6366f1; --m7: #ec4899;

      /* Status */
      --green:      #16a34a;
      --green-soft: #dcfce7;
      --amber:      #d97706;
      --amber-soft: #fef9c3;
      --red:        #dc2626;
      --red-soft:   #fee2e2;

      /* Legacy aliases — components.jsx compatibility */
      --accent:           #f26b1f;
      --accent-strong:    #d8581a;
      --accent-soft:      #fff0e6;
      --navy-900:         #0f2138;
      --navy-800:         #1a3352;
      --navy-700:         #254a72;
      --side-bg:          #0f2138;
      --side-fg:          #ffffff;
      --side-fg-muted:    rgba(255,255,255,0.55);
      --side-section:     rgba(255,255,255,0.45);
      --side-item-hover:  rgba(255,255,255,0.06);
      --side-item-active: rgba(255,255,255,0.12);
      --ink-600:          #4b5563;
      --surface-3:        #eef0f5;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink-900);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    .fade-up   { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
    .fade-in   { animation: fadeIn .25s ease both; }
    .scale-in  { animation: scaleIn .3s cubic-bezier(.22,1,.36,1) both; }

    /* Staggered children */
    .stagger > * { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
    .stagger > *:nth-child(1) { animation-delay: .04s; }
    .stagger > *:nth-child(2) { animation-delay: .08s; }
    .stagger > *:nth-child(3) { animation-delay: .12s; }
    .stagger > *:nth-child(4) { animation-delay: .16s; }
    .stagger > *:nth-child(5) { animation-delay: .20s; }
    .stagger > *:nth-child(6) { animation-delay: .24s; }
    .stagger > *:nth-child(7) { animation-delay: .28s; }
    .stagger > *:nth-child(8) { animation-delay: .32s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Load the React app with Babel -->
  <script type="text/babel" src="/src/App.jsx"></script>
</body>
</html>
