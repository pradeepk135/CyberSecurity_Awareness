version: '3.8'

services:
  # Development server with hot reload
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5173
    stdin_open: true
    tty: true
    restart: unless-stopped
