services:

  # ── Development server (hot reload) ──────────────────────────────
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app                  # mount source for hot reload
      - /app/node_modules       # keep container's node_modules isolated
    environment:
      - NODE_ENV=development
    profiles: [dev]

  # ── Production server (nginx, built bundle) ───────────────────────
  app-prod:
    build:
      context: .
      target: prod
    ports:
      - "80:80"
    profiles: [prod]
